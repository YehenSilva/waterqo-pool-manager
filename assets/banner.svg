  <rect width="1200" height="280" fill="url(#bg)"/>

  <path d="M0,210 C150,170 300,240 450,205 C600,170 750,230 900,200 C1050,175 1150,215 1200,195 L1200,280 L0,280 Z" fill="url(#wave1)"/>
