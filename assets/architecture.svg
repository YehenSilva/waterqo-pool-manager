<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0077B6"/>
    </marker>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9F7FF"/>
      <stop offset="100%" stop-color="#D6EFFC"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="480" fill="#ffffff"/>

  <!-- Browser SPA -->
  <g transform="translate(40,40)">
    <rect width="260" height="120" rx="14" fill="url(#card)" stroke="#0077B6" stroke-width="1.5"/>
    <circle cx="24" cy="24" r="5" fill="#ff5f57"/>
    <circle cx="40" cy="24" r="5" fill="#febc2e"/>
    <circle cx="56" cy="24" r="5" fill="#28c840"/>
    <text x="20" y="56" font-size="16" font-weight="700" fill="#003566">Dashboard (SPA)</text>
    <text x="20" y="78" font-size="12" fill="#345A78">Embedded HTML/CSS/JS</text>
    <text x="20" y="95" font-size="12" fill="#345A78">Client list · month view</text>
    <text x="20" y="112" font-size="12" fill="#345A78">Add / edit / delete UI</text>
  </g>

  <!-- Flask -->
  <g transform="translate(390,40)">
    <rect width="240" height="120" rx="14" fill="url(#card)" stroke="#0077B6" stroke-width="1.5"/>
    <text x="20" y="34" font-size="16" font-weight="700" fill="#003566">Flask REST API</text>
    <text x="20" y="56" font-size="11.5" fill="#345A78">/api/clients</text>
    <text x="20" y="72" font-size="11.5" fill="#345A78">/api/entries</text>
    <text x="20" y="88" font-size="11.5" fill="#345A78">/api/persons</text>
    <text x="20" y="104" font-size="11.5" fill="#345A78">/api/download</text>
  </g>

  <!-- Excel workbook -->
  <g transform="translate(720,40)">
    <rect width="240" height="120" rx="14" fill="url(#card)" stroke="#0077B6" stroke-width="1.5"/>
    <text x="20" y="34" font-size="16" font-weight="700" fill="#003566">pool_service.xlsx</text>
    <text x="20" y="56" font-size="11.5" fill="#345A78">Client Details sheet</text>
    <text x="20" y="72" font-size="11.5" fill="#345A78">One sheet per client</text>
    <text x="20" y="88" font-size="11.5" fill="#345A78">(12 months × entries)</text>
    <text x="20" y="104" font-size="11.5" fill="#345A78">Settings sheet (staff)</text>
  </g>

  <line x1="300" y1="100" x2="388" y2="100" stroke="#0077B6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="388" y1="130" x2="300" y2="130" stroke="#0077B6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="308" y="90" font-size="11" fill="#0077B6">fetch()</text>
  <text x="308" y="146" font-size="11" fill="#0077B6">JSON</text>

  <line x1="630" y1="100" x2="718" y2="100" stroke="#0077B6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="718" y1="130" x2="630" y2="130" stroke="#0077B6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="638" y="90" font-size="11" fill="#0077B6">openpyxl write</text>
  <text x="638" y="146" font-size="11" fill="#0077B6">read</text>

  <!-- Monthly client sheet detail -->
  <g transform="translate(40,220)">
    <rect width="920" height="150" rx="14" fill="#F5FBFF" stroke="#89C7E8" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="24" y="30" font-size="14" font-weight="700" fill="#003566">Per-client sheet layout</text>

    <g transform="translate(24,46)">
      <rect width="200" height="30" rx="6" fill="#0077B6"/>
      <text x="100" y="20" font-size="11" fill="#ffffff" text-anchor="middle">Client Name · Location</text>
    </g>
    <g transform="translate(24,84)">
      <rect width="120" height="26" rx="6" fill="#BFE9FF"/>
      <text x="60" y="18" font-size="10.5" fill="#003566" text-anchor="middle">No.</text>
      <rect x="126" width="150" height="26" rx="6" fill="#BFE9FF"/>
      <text x="201" y="18" font-size="10.5" fill="#003566" text-anchor="middle">Service Person</text>
      <rect x="282" width="110" height="26" rx="6" fill="#BFE9FF"/>
      <text x="337" y="18" font-size="10.5" fill="#003566" text-anchor="middle">Price</text>
      <rect x="398" width="140" height="26" rx="6" fill="#BFE9FF"/>
      <text x="468" y="18" font-size="10.5" fill="#003566" text-anchor="middle">Chlorine Price</text>
      <rect x="544" width="100" height="26" rx="6" fill="#BFE9FF"/>
      <text x="594" y="18" font-size="10.5" fill="#003566" text-anchor="middle">Paid</text>
    </g>
    <text x="24" y="140" font-size="11.5" fill="#345A78">Repeated as 12 monthly blocks (January – December), 8 entries per month.</text>
  </g>

  <!-- Deployment -->
  <g transform="translate(40,400)">
    <rect width="920" height="60" rx="12" fill="#003566"/>
    <text x="24" y="26" font-size="13" font-weight="700" fill="#ffffff">Deployment</text>
    <text x="24" y="46" font-size="12" fill="#CFE8FF">render.yaml → Render web service · buildCommand: pip install -r requirements.txt · startCommand: python service.py</text>
  </g>
</svg>
